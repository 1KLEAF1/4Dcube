<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Тессеракт</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Тессеракт</h1>
    <canvas id="tes" width="500" height="500"></canvas>
    <div>
        <label for="xw">XW</label>
        <input type="range" id="xw" min="0" max="360" value="0">
    </div>
    <div>
        <label for="yw">YW</label>
        <input type="range" id="yw" min="0" max="360" value="0">
    </div>
    <div>
        <label for="zw">ZW</label>
        <input type="range" id="zw" min="0" max="360" value="0">
    </div>
    <script src="script.js"></script>
</body>
</html>
